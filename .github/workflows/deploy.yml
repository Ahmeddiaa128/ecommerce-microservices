name: Ecommerce CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "release/**"
      - "feature/**"
    paths:
      - "services/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - "release/**"
      - "feature/**"  
    paths:
      - "services/**"
      - ".github/workflows/**"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ApiGateway, UserService, ProductService, CartService, OrderService]
        target: [latest, prod, prod, prod, prod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE_TAG="abodiaa/${SERVICE,,}:${{ github.sha }}"

          if [ "$SERVICE" = "ApiGateway" ]; then
            echo "Building $SERVICE without target"
            docker build -f services/$SERVICE/Dockerfile -t $IMAGE_TAG .
          else
            echo "Building $SERVICE with target: ${{ matrix.target }}"
            docker build -f services/$SERVICE/Dockerfile --target ${{ matrix.target }} -t $IMAGE_TAG .
          fi

      - name: Push Docker image
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE_TAG="abodiaa/${SERVICE,,}:${{ github.sha }}"
          docker push $IMAGE_TAG

  image-scan:
    needs: docker-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ApiGateway, UserService, ProductService, CartService, OrderService]
    steps:
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: abodiaa/${{ matrix.service,, }}:${{ github.sha }}

